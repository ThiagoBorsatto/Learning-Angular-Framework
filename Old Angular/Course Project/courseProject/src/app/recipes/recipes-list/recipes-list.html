<div class="row">
    <div class="col-xs-12">
        <button class="btn btn-success" (click)="onNewRecipe()">New Recipe</button>
    </div>
</div>
<hr>
<div class="row">
    <div class="col-xs-12">
        @for (recipeEl of recipes; track $index) {
            <app-recipes-item 
                [recipe]="recipeEl"
                [index]="$index"
            />
        }
    </div>
</div>

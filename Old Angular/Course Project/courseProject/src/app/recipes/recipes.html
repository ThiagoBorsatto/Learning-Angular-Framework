<div class="row">
    <div class="col-md-5">
        <app-recipes-list 
            (recipeWasSelected)="selectedRecipe = $event"
        />
    </div>
    <div class="col-md-7">
        @if (selectedRecipe) {
            <app-recipes-detail 
                [recipe]="selectedRecipe"
            />
        } @else {
            <ng-template>
                <p>Please select a Recipe!</p>
            </ng-template>
        }
    </div>
</div>
